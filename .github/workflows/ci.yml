name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm turbo lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm turbo typecheck

  test:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Unit tests + coverage
        run: pnpm test:coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm turbo build
        # `next build` prerenders public pages, which transitively load modules
        # that call requireEnv(...) at import time (e.g. the Supabase admin client,
        # Stripe, Resend, Upstash). With NO env, prerender throws
        # "Missing required environment variable: ..." and the build fails on every
        # PR — a false-red that would defeat this gate. Prerender does NO network
        # I/O, so it only needs the vars to be NON-EMPTY, not valid. These are
        # deliberately fake placeholders — NOT secrets, and the build does NOT
        # validate connectivity. Do not replace them with real credentials.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://dummy-build-only.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-build-only
          SUPABASE_SERVICE_ROLE_KEY: dummy-build-only
          NEXT_PUBLIC_APP_URL: https://dummy-build-only.example.com
          STRIPE_SECRET_KEY: dummy-build-only
          STRIPE_WEBHOOK_SECRET: dummy-build-only
          STRIPE_PRO_PRICE_ID: price_dummy_build_only
          STRIPE_POWER_PRICE_ID: price_dummy_build_only
          RESEND_API_KEY: dummy-build-only
          RESEND_FROM_ADDRESS: build-only@example.com
          UPSTASH_REDIS_REST_URL: https://dummy-build-only.upstash.io
          UPSTASH_REDIS_REST_TOKEN: dummy-build-only
          SENDGRID_INGEST_SECRET: dummy-build-only
          CRON_SECRET: dummy-build-only

  e2e:
    name: E2E tests
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: E2E tests
        run: pnpm e2e
        env:
          # Next.js dev server (spawned by Playwright webServer when BASE_URL is unset)
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_TEST_WEBHOOK_SECRET }}
          # auth.setup.ts — creates test users via Supabase admin API
          SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          E2E_FREE_USER_EMAIL: ${{ secrets.E2E_FREE_USER_EMAIL }}
          E2E_PRO_USER_EMAIL: ${{ secrets.E2E_PRO_USER_EMAIL }}
          E2E_ADMIN_USER_EMAIL: ${{ secrets.E2E_ADMIN_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
